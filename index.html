<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Анимация 3D модели LR7</title>

  <!-- Подключаем model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #ffffff; /* белый фон */
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 600px;
      height: 500px;

      /* Эффект насыщенности цветов */
      filter: saturate(1.8) contrast(1.2) brightness(1.1);
    }

    /* Стили кнопки AR */
    button[slot="ar-button"] {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5em 1em;
      font-size: 16px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<model-viewer
  id="model"
  src="LR7.glb"
  ios-src="LR7.usdz"
  camera-controls
  autoplay
  animation-name="Приветствие"
  ar
  ar-modes="webxr scene-viewer quick-look"
  alt="3D модель LR7">

  <!-- Кнопка AR -->
  <button slot="ar-button">Посмотреть в AR</button>
</model-viewer>

<script>
  const model = document.querySelector("#model");

  model.addEventListener("load", () => {
    // Через 3 секунды переключаем анимацию на "Танец" с плавным переходом
    setTimeout(() => {
      model.animationName = "Танец";
      model.play({
        repetitions: Infinity,
        crossfadeDuration: 1000
      });
    }, 3000);
  });
</script>

</body>
</html>
